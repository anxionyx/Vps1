name: Vulnerable Windows 7 ISO Lab
on:
  workflow_dispatch:
    inputs:
      iso_url:
        description: 'Direct download URL for the Windows 7 ISO'
        required: true
        type: string

jobs:
  run-lab:
    runs-on: ubuntu-latest
    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          # This reclaims space by removing large pre-installed tools
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Install QEMU and Cloudflared
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86
          # Specific cloudflared version requested
          curl -L -o cloudflared.deb https://github.com/cloudflare/cloudflared/releases/download/2026.3.0/cloudflared-fips-linux-amd64.deb
          sudo dpkg -i cloudflared.deb

      - name: Download Windows ISO
        run: |
          # Use provided URL
          curl -L -o win7.iso "${{ github.event.inputs.iso_url }}"

      - name: Create Virtual Disk
        # Creating a sparse qcow2 disk to save space initially
        run: qemu-img create -f qcow2 win7_disk.qcow2 20G

      - name: Start QEMU VM
        run: |
          qemu-system-x86_64 \
            -m 2048 \
            -cdrom win7.iso \
            -hda win7_disk.qcow2 \
            -boot d \
            -net nic -net user,hostfwd=tcp::445-:445 \
            -nographic &
          sleep 60

      - name: Start Cloudflare Tunnel (Quick Tunnel)
        run: |
          # Exposes the SMB port 445 via an ephemeral public URL
          # No signup or login required for this "Quick Tunnel"
          cloudflared tunnel --url tcp://localhost:445
